name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署；新 push 取消進行中的舊部署。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # 若日後文章要用 git 時間戳，保留完整歷史。
          fetch-depth: 0
      - name: Build Astro site
        uses: withastro/action@v6
        # withastro/action 會自動偵測 pnpm lockfile 並安裝、build。
        # 預設 Node 24。輸出在 dist/，並上傳成 Pages artifact。

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
